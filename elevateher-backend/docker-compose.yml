# Run with: docker-compose up --build
# Spins up frontend + backend + Postgres + ML together for production-style testing.
# For everyday dev against a local PostgreSQL database, use `npm run dev`.

services:
  frontend:
    build:
      context: ../frontend
      args:
        # Browser calls the backend published on the host.
        VITE_API_BASE_URL: http://localhost:5000/api
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
    depends_on:
      backend:
        condition: service_started

  backend:
    build: .
    ports:
      - "5000:5000"
    environment:
      - PORT=5000
      - NODE_ENV=production
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=7d
      - DATABASE_URL=postgresql://elevateher:elevateher@postgres:5432/elevateher
      - ML_SERVICE_URL=http://ml:8000
      - ML_TIMEOUT_MS=1500
      # Optional — payment features only; the backend boots without these.
      - RAZORPAY_KEY_ID=${RAZORPAY_KEY_ID:-}
      - RAZORPAY_KEY_SECRET=${RAZORPAY_KEY_SECRET:-}
    depends_on:
      postgres:
        condition: service_healthy
      ml:
        condition: service_healthy
    volumes:
      - uploads_data:/app/uploads

  ml:
    build:
      context: ../elevateher-ml/elevateher-ml
    ports:
      - "8000:8000"
    healthcheck:
      # python:3.12-slim has no curl; use the bundled Python to hit the health route.
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8000/')\""]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s

  postgres:
    image: postgres:16-alpine
    restart: always
    environment:
      - POSTGRES_USER=elevateher
      - POSTGRES_PASSWORD=elevateher
      - POSTGRES_DB=elevateher
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U elevateher -d elevateher"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 5s
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
  uploads_data:
